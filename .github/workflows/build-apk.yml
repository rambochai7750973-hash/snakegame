name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download and patch p4a BEFORE buildozer uses it
        run: |
          git clone --depth=1 --branch=v2024.01.21 \
            https://github.com/kivy/python-for-android.git p4a_local
          # Patch the build.py template to handle multi-line project.properties
          python3 -c "
f = 'p4a_local/pythonforandroid/bootstraps/common/build/build.py'
with open(f) as fh:
    c = fh.read()
old = '''    with open('project.properties', 'r') as fileh:
        target = fileh.read().strip()
    android_api = target.split('-')[1]'''
new = '''    with open('project.properties', 'r') as fileh:
        for _l in fileh:
            if _l.startswith('target='):
                target = _l.strip().split('=')[1].split('-')[1]
                break
        else:
            raise ValueError('No target= line in project.properties')
    android_api = target'''
if old in c:
    c = c.replace(old, new)
    with open(f, 'w') as fh:
        fh.write(c)
    print('OK: Template patched')
else:
    print('ERROR: old code not found')
    exit(1)
"
          # Tell buildozer to use this local p4a
          sed -i 's|^p4a.source_dir =$|p4a.source_dir = ./p4a_local|' buildozer.spec
          echo "Using local p4a: $(pwd)/p4a_local"

      - name: Build APK
        run: |
          yes | buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Find APK
        run: |
          echo "=== bin/ contents ==="
          ls -la bin/ 2>/dev/null || echo "(empty)"
          echo "=== any .apk files ==="
          find "$PWD" -name "*.apk" -type f 2>/dev/null || echo "(none)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snakegame-apk
          path: |
            bin/*.apk
            *.apk
            **/*.apk
