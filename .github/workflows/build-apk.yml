name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK (first pass downloads SDK/NDK, hook.py fixes project.properties)
        continue-on-error: true
        run: |
          yes | buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Patch p4a template (backup fix)
        run: |
          python3 fix_build.py
        continue-on-error: true

      - name: Clean build cache and rebuild
        run: |
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists/
          yes | buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Find APK files
        run: |
          echo "--- Looking for APK files ---"
          ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "--- Checking buildozer output ---"
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snakegame-apk
          path: |
            bin/*.apk
            *.apk
            **/*.apk
