name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download and patch p4a BEFORE buildozer uses it
        run: |
          git clone --depth=1 --branch=v2024.01.21 \
            https://github.com/kivy/python-for-android.git p4a_local
          python3 patch_p4a.py p4a_local
          sed -i 's|^p4a.source_dir =$|p4a.source_dir = ./p4a_local|' buildozer.spec

      - name: Build APK
        run: |
          yes | buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snakegame-apk
          path: |
            bin/*.apk
            *.apk
            **/*.apk
