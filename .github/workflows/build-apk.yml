name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          # Pre-accept Android SDK license to avoid interactive prompt
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license"
          # Clean stale dist cache and build
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists/
          yes | buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snakegame-apk
          path: bin/*.apk
