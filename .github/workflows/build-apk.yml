name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-pip

      - name: Find Java home
        run: |
          update-java-alternatives -l 2>/dev/null || true
          java -XshowSettings:properties -version 2>&1 | grep 'java.home'
          ls -la /usr/lib/jvm/ 2>/dev/null || true
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: First build (download SDK/NDK, build recipes, will fail at packaging)
        continue-on-error: true
        run: |
          yes | buildozer android debug 2>&1 | tee buildozer-first.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload first build log (even if failed)
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-first-log
          path: buildozer-first.log
        if: always()

      - name: Patch p4a template (backup fix for project.properties)
        run: |
          python3 fix_build.py
        continue-on-error: true

      - name: Clean dist and rebuild APK with hook fix
        run: |
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists/
          yes | buildozer android debug 2>&1 | tee buildozer-second.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload second build log
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-second-log
          path: buildozer-second.log
        if: always()

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snakegame-apk
          path: bin/*.apk
