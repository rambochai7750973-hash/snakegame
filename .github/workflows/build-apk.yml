name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Pre-download p4a to buildozer's expected location and patch
        run: |
          P4A_DIR=".buildozer/android/platform/python-for-android"
          mkdir -p "$P4A_DIR"
          git clone --depth=1 --branch=v2024.01.21 \
            https://github.com/kivy/python-for-android.git "$P4A_DIR"
          python3 patch_p4a.py "$P4A_DIR"

      - name: Build APK
        run: |
          set +o pipefail
          yes 2>/dev/null | buildozer android debug 2>&1 | tee build_output.log
          exit ${PIPESTATUS[1]}
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        shell: bash

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-log
          path: build_output.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: snakegame-apk
          path: bin/*.apk
