name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: First build (download p4a, build native libs, will fail at packaging)
        continue-on-error: true
        run: |
          yes | buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Patch p4a build.py template for new Android SDK
        run: |
          P4A_DIR="$GITHUB_WORKSPACE/.buildozer/android/platform/python-for-android"
          BUILD_PY="$P4A_DIR/pythonforandroid/bootstraps/common/build/build.py"
          if [ -f "$BUILD_PY" ]; then
            sed -i 's/target = fileh.read().strip()/for _l in fileh:\n            if _l.startswith("target="):\n                target = _l.strip().split("=")[1]\n                break/' "$BUILD_PY"
            echo "Patched p4a build.py template"
          else
            echo "ERROR: build.py template not found at $BUILD_PY"
            ls -la "$P4A_DIR/pythonforandroid/bootstraps/common/build/" 2>/dev/null || echo "Directory not found"
            exit 1
          fi

      - name: Patch dist build.py
        run: |
          DIST_BUILD_PY="$GITHUB_WORKSPACE/.buildozer/android/platform/build-arm64-v8a/dists/snakegame/build.py"
          if [ -f "$DIST_BUILD_PY" ]; then
            sed -i 's/target = fileh.read().strip()/for _l in fileh:\n            if _l.startswith("target="):\n                target = _l.strip().split("=")[1]\n                break/' "$DIST_BUILD_PY"
            echo "Patched dist build.py"
          else
            echo "Dist build.py not found (will be regenerated)"
          fi

      - name: Clean dist and rebuild APK
        run: |
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists/
          yes | buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snakegame-apk
          path: bin/*.apk
